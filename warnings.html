<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UTMC Warnings">
<title>UTMC Online Sites — Warning Tracker</title>
<style>
  :root {
    --navy: #1B2A4A;
    --navy-dark: #111E35;
    --navy-light: #2A3F6B;
    --accent: #2E7DCC;
    --accent-light: #E8F2FB;
    --bg: #F0F2F5;
    --white: #FFFFFF;
    --border: #DDE1E9;
    --text: #1A1A2E;
    --text-mid: #4A5568;
    --text-light: #718096;
    --green: #1A7F4B;
    --green-bg: #EAF7F0;
    --green-border: #A3D9B8;
    --red: #B91C1C;
    --red-bg: #FEF2F2;
    --red-border: #FECACA;
    --amber: #92400E;
    --amber-bg: #FFFBEB;
    --amber-border: #FDE68A;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 50%, var(--navy-light) 100%);
    color: white;
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }
  .logo-wrap {
    flex-shrink: 0;
    background: white;
    padding: 6px 10px;
    border-radius: 8px;
    line-height: 1;
  }
  .logo-wrap img { height: 36px; width: auto; display: block; }
  .header-titles { flex: 1; }
  .header-titles h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
  .header-titles p { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; letter-spacing: 0.02em; text-transform: uppercase; }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .date-badge {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.8rem;
    font-weight: 500;
    white-space: nowrap;
  }
  .tech-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .tech-input-wrap label { font-size: 0.75rem; opacity: 0.7; white-space: nowrap; }
  .tech-input-wrap input {
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 0.85rem;
    font-weight: 500;
    width: 160px;
    font-family: inherit;
  }
  .tech-input-wrap input::placeholder { color: rgba(255,255,255,0.4); }

  /* ── PROGRESS BAR ── */
  .progress-section {
    background: rgba(0,0,0,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-top: 12px;
  }
  .progress-label {
    font-size: 0.75rem;
    opacity: 0.8;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .progress-label span { font-weight: 600; opacity: 1; }
  .progress-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    gap: 1px;
  }
  .progress-bar-resolved { background: #34C77B; border-radius: 4px 0 0 4px; transition: width 0.4s ease; }
  .progress-bar-issues { background: #F87171; transition: width 0.4s ease; }
  .progress-bar-pending { background: rgba(255,255,255,0.3); border-radius: 0 4px 4px 0; flex: 1; }
  .progress-pills {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .progress-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    opacity: 0.9;
  }
  .progress-pill-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-resolved { background: #34C77B; }
  .dot-issues { background: #F87171; }
  .dot-pending { background: rgba(255,255,255,0.4); }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    position: sticky;
    top: 0;
    z-index: 90;
    box-shadow: var(--shadow);
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group + .filter-group {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .filter-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    margin-right: 2px;
  }
  .pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-mid);
    transition: all 0.15s ease;
    white-space: nowrap;
    line-height: 1.4;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--navy); color: white; border-color: var(--navy); }

  /* ── CONTENT ── */
  .content { padding: 16px; max-width: 960px; margin: 0 auto; }
  .site-count {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 12px;
    font-weight: 500;
  }

  /* ── SITE CARDS ── */
  .site-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .site-card.status-clear {
    border-color: var(--green-border);
    background: linear-gradient(to right, var(--green-bg) 0%, var(--white) 100%);
    box-shadow: 0 2px 12px rgba(26,127,75,0.1);
  }
  .site-card.status-issue {
    border-color: var(--red-border);
    background: linear-gradient(to right, var(--red-bg) 0%, var(--white) 100%);
    box-shadow: 0 2px 12px rgba(185,28,28,0.1);
  }
  .site-card.status-partial {
    border-color: var(--amber-border);
    background: linear-gradient(to right, var(--amber-bg) 0%, var(--white) 100%);
    box-shadow: 0 2px 12px rgba(146,64,14,0.1);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }
  .card-status-bar {
    width: 4px;
    height: 36px;
    border-radius: 2px;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .status-clear .card-status-bar { background: var(--green); }
  .status-issue .card-status-bar { background: var(--red); }
  .status-partial .card-status-bar { background: var(--amber); }

  .card-header-info { flex: 1; min-width: 0; }
  .card-header-top {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .scn-badge {
    font-size: 0.7rem;
    font-weight: 700;
    background: var(--navy);
    color: white;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .district-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .district-Newcastle     { background: #EEF2FF; color: #3730A3; }
  .district-NorthTyneside { background: #E0F2FE; color: #075985; }
  .district-Gateshead     { background: #F0FDF4; color: #166534; }
  .district-SouthTyneside { background: #FFF7ED; color: #9A3412; }
  .district-Sunderland    { background: #FDF4FF; color: #6B21A8; }
  .district-Northumberland{ background: #FFF1F2; color: #9F1239; }

  .site-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .warning-badge {
    margin-left: auto;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .warning-badge.wbadge-pending {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid var(--amber-border);
  }
  .warning-badge.wbadge-clear {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
  }
  .warning-badge.wbadge-issue {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid var(--red-border);
  }
  .warning-badge.wbadge-partial {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid var(--amber-border);
  }
  .chevron {
    width: 20px; height: 20px;
    flex-shrink: 0;
    color: var(--text-light);
    transition: transform 0.2s ease;
  }
  .chevron.open { transform: rotate(180deg); }

  /* ── CARD BODY ── */
  .card-body {
    display: none;
    padding: 0 12px 12px 12px;
    border-top: 1px solid var(--border);
  }
  .card-body.open { display: block; }

  /* ── WARNING ROWS ── */
  .warnings-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .warning-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    transition: background 0.15s, border-color 0.15s;
  }
  .warning-row.wr-resolved {
    background: var(--green-bg);
    border-color: var(--green-border);
  }
  .warning-row.wr-issue {
    background: var(--red-bg);
    border-color: var(--red-border);
  }
  .warning-row-info { flex: 1; min-width: 0; }
  .warning-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
  }
  .warning-status-text {
    font-size: 0.72rem;
    color: var(--text-light);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .warning-row-actions {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .w-btn {
    width: 30px; height: 30px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .w-btn:hover { opacity: 0.8; transform: scale(1.05); }
  .w-btn:active { transform: scale(0.95); }
  .w-btn-resolve {
    background: var(--green-bg);
    color: var(--green);
    border: 1.5px solid var(--green-border);
  }
  .w-btn-resolve.active {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  .w-btn-issue {
    background: var(--red-bg);
    color: var(--red);
    border: 1.5px solid var(--red-border);
  }
  .w-btn-issue.active {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }
  .w-btn-reset {
    background: var(--bg);
    color: var(--text-light);
    border: 1.5px solid var(--border);
  }
  .issue-note-wrap {
    margin-top: 6px;
  }
  .issue-note-input {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--red-border);
    border-radius: 6px;
    font-size: 0.78rem;
    font-family: inherit;
    background: white;
    color: var(--text);
    outline: none;
    resize: none;
  }
  .issue-note-input:focus { border-color: var(--red); }
  .issue-note-input::placeholder { color: var(--text-light); }

  /* ── NOTES BOX ── */
  .site-notes-box {
    margin-top: 10px;
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 0.78rem;
    color: var(--amber);
  }
  .site-notes-box strong { display: block; margin-bottom: 2px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; }

  /* ── TECH NOTE ── */
  .tech-note-section {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .tech-note-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .tech-note-textarea {
    width: 100%;
    min-height: 60px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-size: 0.82rem;
    font-family: inherit;
    color: var(--text);
    resize: vertical;
    background: var(--white);
    transition: border-color 0.15s;
  }
  .tech-note-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(46,125,204,0.1);
  }
  .tech-note-textarea::placeholder { color: var(--text-light); }
  .tech-note-saved {
    font-size: 0.7rem;
    color: var(--green);
    font-weight: 600;
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tech-note-saved.visible { opacity: 1; }

  /* ── NAV BUTTON ── */
  .nav-btn-wrap { padding: 10px 0 0; }
  .nav-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px 10px; border-radius: var(--radius-sm);
    border: 2px solid var(--accent); background: var(--accent-light);
    color: var(--accent); font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer; min-height: 48px;
    -webkit-tap-highlight-color: transparent; transition: all 0.15s ease;
    text-decoration: none;
  }
  .nav-btn:hover, .nav-btn:active {
    background: var(--accent); color: white;
    box-shadow: 0 4px 12px rgba(46,125,204,0.3);
  }
  .nav-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

  /* ── LAST UPDATED ── */
  .last-updated {
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--text-light);
    text-align: right;
  }

  /* ── NO WARNINGS STATE ── */
  .no-warnings-msg {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: var(--radius-sm);
    font-size: 0.8rem;
    color: var(--green);
    font-weight: 500;
    text-align: center;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    position: sticky;
    bottom: 0;
    z-index: 90;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .btn {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--navy); color: white; }
  .btn-danger { background: var(--red); color: white; }
  .btn-ghost { background: var(--bg); color: var(--text-mid); border: 1.5px solid var(--border); }

  /* ── MODALS ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    background: var(--navy);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 1rem; font-weight: 700; }
  .modal-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .report-text {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.75rem;
    white-space: pre-wrap;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    max-height: 400px;
    overflow-y: auto;
    color: var(--text);
    line-height: 1.6;
  }

  /* ── CONFIRM MODAL ── */
  .confirm-modal-body p { font-size: 0.9rem; color: var(--text-mid); line-height: 1.6; }
  .confirm-modal-body strong { color: var(--red); }

  /* ── NO SITES ── */
  .no-sites-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
    font-size: 0.9rem;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .header { padding: 14px 14px 12px; }
    .header-titles h1 { font-size: 1.05rem; }
    .header-meta { flex-direction: column; align-items: flex-start; gap: 6px; }
    .tech-input-wrap input { width: 130px; }
    .content { padding: 10px; }
    .warning-row {
      flex-direction: column;
      gap: 8px;
    }
    .warning-row-actions { justify-content: flex-start; }
    .toolbar { padding: 8px 10px; }
    .btn { font-size: 0.78rem; padding: 7px 14px; }
    .site-name { font-size: 0.8rem; }
    .progress-pills { gap: 8px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">

// ── WARNING FIELD CONFIG ──
// field, exclude values (treated as "no warning"), display label
const WARNING_FIELDS = [
  { field: 'signalDetection', exclude: ['N/A','INSTALLED'], label: 'Signal Detection' },
  { field: 'antennas',        exclude: ['N/A','INSTALLED'], label: '5G Antennas' },
  { field: 'firmware',        exclude: ['N/A','INSTALLED'], label: 'Licence / Firmware' },
  { field: 'mova',            exclude: ['N/A'],             label: 'MOVA Online' },
  { field: 'ic4',             exclude: ['N/A'],             label: 'IC4 Update' },
  { field: 'controllerInstall', exclude: ['INSTALLED'],     label: 'Controller Install' },
  { field: 'anpr',            exclude: ['N/A','INSTALLED'], label: 'ANPR / Smart Detection' },
];

function getSiteWarnings(site) {
  return WARNING_FIELDS.filter(wf => !wf.exclude.includes(site[wf.field]));
}

// ── STATE ──
const STORAGE_KEY = 'utmc_online_warnings_v1';
let state = { techName: '', warnings: {}, techNotes: {} };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state.techName = saved.techName || '';
      state.warnings = saved.warnings || {};
      state.techNotes = saved.techNotes || {};
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getWarningState(siteIdx, field) {
  return (state.warnings[siteIdx] && state.warnings[siteIdx][field]) || null;
}

function setWarningState(siteIdx, field, status, note) {
  if (!state.warnings[siteIdx]) state.warnings[siteIdx] = {};
  state.warnings[siteIdx][field] = {
    status,
    note: note || '',
    timestamp: new Date().toISOString()
  };
  saveState();
}

function clearWarningState(siteIdx, field) {
  if (state.warnings[siteIdx]) {
    delete state.warnings[siteIdx][field];
    if (Object.keys(state.warnings[siteIdx]).length === 0) {
      delete state.warnings[siteIdx];
    }
  }
  saveState();
}

// ── FILTER STATE ──
let activeDistrict = 'all';
let activeStatus = 'all';

// ── COMPUTE SITE STATUS ──
function computeSiteStatus(siteIdx) {
  const site = sites[siteIdx];
  const warnings = getSiteWarnings(site);
  if (warnings.length === 0) return 'nowarnings';
  const ws = state.warnings[siteIdx] || {};
  const resolved = warnings.filter(w => ws[w.field] && ws[w.field].status === 'resolved').length;
  const issues = warnings.filter(w => ws[w.field] && ws[w.field].status === 'issue').length;
  if (issues > 0) return 'issue';
  if (resolved === warnings.length) return 'clear';
  if (resolved > 0) return 'partial';
  return 'pending';
}

// ── PROGRESS TOTALS ──
function computeTotals() {
  let total = 0, resolved = 0, issues = 0;
  sites.forEach((site, idx) => {
    const ws = getSiteWarnings(site);
    total += ws.length;
    const sw = state.warnings[idx] || {};
    ws.forEach(w => {
      if (sw[w.field]) {
        if (sw[w.field].status === 'resolved') resolved++;
        else if (sw[w.field].status === 'issue') issues++;
      }
    });
  });
  return { total, resolved, issues, pending: total - resolved - issues };
}

// ── HTML ESCAPE ──
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ── RENDER PROGRESS ──
function renderProgress() {
  const { total, resolved, issues, pending } = computeTotals();
  const pct = n => total > 0 ? Math.round(n / total * 100) : 0;
  document.getElementById('progressLabel').textContent = `${resolved + issues} of ${total} warnings addressed`;
  document.getElementById('progressFraction').textContent = `${pct(resolved + issues)}%`;
  document.getElementById('barResolved').style.width = pct(resolved) + '%';
  document.getElementById('barIssues').style.width = pct(issues) + '%';
  document.getElementById('pillResolved').textContent = `${resolved} Resolved`;
  document.getElementById('pillIssues').textContent = `${issues} Issues`;
  document.getElementById('pillPending').textContent = `${pending} Pending`;
}

// ── FILTER HELPERS ──
function districtClass(district) {
  return 'district-' + district.replace(/\s/g,'');
}

function matchesFilters(siteIdx) {
  const site = sites[siteIdx];
  if (activeDistrict !== 'all' && site.district !== activeDistrict) return false;
  if (activeStatus !== 'all') {
    const st = computeSiteStatus(siteIdx);
    if (activeStatus === 'pending' && st !== 'pending' && st !== 'nowarnings') return false;
    if (activeStatus === 'partial' && st !== 'partial') return false;
    if (activeStatus === 'clear' && st !== 'clear' && st !== 'nowarnings') return false;
    if (activeStatus === 'issue' && st !== 'issue') return false;
    // Adjusted pending: "pending" filter = no warnings addressed yet, or sites with no warnings
    if (activeStatus === 'pending' && st !== 'pending') return false;
  }
  return true;
}

// ── BUILD CARD ──
function buildCard(siteIdx) {
  const site = sites[siteIdx];
  const warnings = getSiteWarnings(site);
  const status = computeSiteStatus(siteIdx);
  const sw = state.warnings[siteIdx] || {};

  // Status class
  let cardClass = '';
  if (status === 'clear' || status === 'nowarnings') cardClass = 'status-clear';
  else if (status === 'issue') cardClass = 'status-issue';
  else if (status === 'partial') cardClass = 'status-partial';

  // Warning badge
  let badgeHtml = '';
  if (warnings.length === 0) {
    badgeHtml = '<span class="warning-badge wbadge-clear">No Warnings</span>';
  } else {
    const resolvedCount = warnings.filter(w => sw[w.field] && sw[w.field].status === 'resolved').length;
    const issueCount = warnings.filter(w => sw[w.field] && sw[w.field].status === 'issue').length;
    if (status === 'clear') {
      badgeHtml = '<span class="warning-badge wbadge-clear">All Clear</span>';
    } else if (status === 'issue') {
      badgeHtml = `<span class="warning-badge wbadge-issue">${issueCount} issue${issueCount!==1?'s':''}</span>`;
    } else if (status === 'partial') {
      const done = resolvedCount + issueCount;
      badgeHtml = `<span class="warning-badge wbadge-partial">${done}/${warnings.length} done</span>`;
    } else {
      badgeHtml = `<span class="warning-badge wbadge-pending">${warnings.length} warning${warnings.length!==1?'s':''}</span>`;
    }
  }

  // Warning rows
  let warningsHtml = '';
  if (warnings.length === 0) {
    warningsHtml = '<div class="no-warnings-msg">No outstanding warnings for this site.</div>';
  } else {
    warningsHtml = '<div class="warnings-list">';
    warnings.forEach(wf => {
      const wState = sw[wf.field] || null;
      const isResolved = wState && wState.status === 'resolved';
      const isIssue = wState && wState.status === 'issue';
      const rowClass = isResolved ? 'wr-resolved' : isIssue ? 'wr-issue' : '';
      const resolveActive = isResolved ? 'active' : '';
      const issueActive = isIssue ? 'active' : '';
      const statusVal = esc(site[wf.field]);
      const noteVal = (wState && wState.note) ? esc(wState.note) : '';
      const noteDisplay = isIssue ? '' : 'display:none';
      warningsHtml += `
        <div class="warning-row ${rowClass}" id="wr-${siteIdx}-${wf.field}">
          <div class="warning-row-info">
            <div class="warning-label">${esc(wf.label)}</div>
            <div class="warning-status-text">${statusVal}</div>
            <div class="issue-note-wrap" style="${noteDisplay}" id="note-wrap-${siteIdx}-${wf.field}">
              <textarea class="issue-note-input" rows="2" placeholder="Describe the issue..."
                onchange="updateNote(${siteIdx},'${wf.field}',this.value)"
                onblur="updateNote(${siteIdx},'${wf.field}',this.value)"
                id="note-input-${siteIdx}-${wf.field}">${noteVal}</textarea>
            </div>
          </div>
          <div class="warning-row-actions">
            <button class="w-btn w-btn-resolve ${resolveActive}" title="Mark Resolved"
              onclick="resolveWarning(${siteIdx},'${wf.field}')" aria-label="Mark ${esc(wf.label)} as resolved">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="w-btn w-btn-issue ${issueActive}" title="Log Issue"
              onclick="issueWarning(${siteIdx},'${wf.field}')" aria-label="Log issue for ${esc(wf.label)}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <button class="w-btn w-btn-reset" title="Reset"
              onclick="resetWarning(${siteIdx},'${wf.field}')" aria-label="Reset ${esc(wf.label)}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
            </button>
          </div>
        </div>`;
    });
    warningsHtml += '</div>';
  }

  // Notes box
  let notesHtml = '';
  if (site.notes && site.notes.trim()) {
    notesHtml = `<div class="site-notes-box"><strong>Spreadsheet Note</strong>${esc(site.notes)}</div>`;
  }

  return `
    <div class="site-card ${cardClass}" id="card-${siteIdx}" data-idx="${siteIdx}">
      <div class="card-header" onclick="toggleCard(${siteIdx})" role="button" aria-expanded="false" aria-controls="body-${siteIdx}">
        <div class="card-status-bar" aria-hidden="true"></div>
        <div class="card-header-info">
          <div class="card-header-top">
            <span class="scn-badge">${esc(site.scn)}</span>
            <span class="district-badge ${districtClass(site.district)}">${esc(site.district)}</span>
          </div>
          <div class="site-name">${esc(site.site)}</div>
        </div>
        ${badgeHtml}
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="card-body" id="body-${siteIdx}">
        ${warningsHtml}
        ${notesHtml}
        <div class="tech-note-section">
          <div class="tech-note-label">Technician Note</div>
          <textarea class="tech-note-textarea" id="technote-${siteIdx}"
            placeholder="Add a note, suggestion, or flag something for later..."
            oninput="saveTechNote(${siteIdx})">${esc(state.techNotes[siteIdx] || '')}</textarea>
          <div class="tech-note-saved" id="technote-saved-${siteIdx}">Saved</div>
        </div>
        ${site.lat ? `<div class="nav-btn-wrap">
          <a class="nav-btn" href="https://www.google.com/maps/dir/?api=1&destination=${site.lat},${site.lon}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            Navigate to Site
          </a>
        </div>` : ''}
        <div class="last-updated">Data last updated: ${esc(site.lastUpdate)}</div>
      </div>
    </div>`;
}

// ── RENDER CARDS ──
function renderCards() {
  const container = document.getElementById('cardsList');
  const countEl = document.getElementById('siteCount');
  let html = '';
  let count = 0;
  sites.forEach((site, idx) => {
    if (!matchesFilters(idx)) return;
    html += buildCard(idx);
    count++;
  });
  if (!html) {
    html = '<div class="no-sites-msg">No sites match the current filters.</div>';
  }
  container.innerHTML = html;
  countEl.textContent = `Showing ${count} of ${sites.length} sites`;
  renderProgress();
}

// ── UPDATE SINGLE CARD ──
function updateCard(siteIdx) {
  const existing = document.getElementById(`card-${siteIdx}`);
  if (!existing) return; // not visible
  const wasOpen = existing.querySelector('.card-body.open') !== null;
  const newHtml = buildCard(siteIdx);
  const temp = document.createElement('div');
  temp.innerHTML = newHtml;
  const newCard = temp.firstElementChild;
  existing.replaceWith(newCard);
  if (wasOpen) {
    const body = newCard.querySelector('.card-body');
    const header = newCard.querySelector('.card-header');
    const chevron = newCard.querySelector('.chevron');
    if (body) body.classList.add('open');
    if (header) header.setAttribute('aria-expanded','true');
    if (chevron) chevron.classList.add('open');
  }
  renderProgress();
}

// ── TOGGLE CARD ──
function toggleCard(siteIdx) {
  const body = document.getElementById(`body-${siteIdx}`);
  const header = body.previousElementSibling;
  const chevron = header.querySelector('.chevron');
  const open = body.classList.toggle('open');
  header.setAttribute('aria-expanded', open ? 'true' : 'false');
  chevron.classList.toggle('open', open);
}

// ── WARNING ACTIONS ──
function resolveWarning(siteIdx, field) {
  const ws = state.warnings[siteIdx] && state.warnings[siteIdx][field];
  if (ws && ws.status === 'resolved') {
    // Toggle off
    clearWarningState(siteIdx, field);
  } else {
    setWarningState(siteIdx, field, 'resolved', '');
  }
  updateCard(siteIdx);
  updateFilterIfNeeded();
}

function issueWarning(siteIdx, field) {
  const ws = state.warnings[siteIdx] && state.warnings[siteIdx][field];
  if (ws && ws.status === 'issue') {
    // Toggle off
    clearWarningState(siteIdx, field);
    updateCard(siteIdx);
  } else {
    const existingNote = (ws && ws.note) ? ws.note : '';
    setWarningState(siteIdx, field, 'issue', existingNote);
    updateCard(siteIdx);
    // Focus note input
    setTimeout(() => {
      const ni = document.getElementById(`note-input-${siteIdx}-${field}`);
      if (ni) ni.focus();
    }, 50);
  }
  updateFilterIfNeeded();
}

function resetWarning(siteIdx, field) {
  clearWarningState(siteIdx, field);
  updateCard(siteIdx);
  updateFilterIfNeeded();
}

function updateNote(siteIdx, field, value) {
  const ws = state.warnings[siteIdx] && state.warnings[siteIdx][field];
  if (ws && ws.status === 'issue') {
    ws.note = value;
    saveState();
  }
}

let techNoteSaveTimers = {};
function saveTechNote(siteIdx) {
  clearTimeout(techNoteSaveTimers[siteIdx]);
  techNoteSaveTimers[siteIdx] = setTimeout(() => {
    const ta = document.getElementById('technote-' + siteIdx);
    if (!ta) return;
    const val = ta.value.trim();
    if (val) {
      state.techNotes[siteIdx] = val;
    } else {
      delete state.techNotes[siteIdx];
    }
    saveState();
    const saved = document.getElementById('technote-saved-' + siteIdx);
    if (saved) {
      saved.classList.add('visible');
      setTimeout(() => saved.classList.remove('visible'), 1500);
    }
  }, 400);
}

function updateFilterIfNeeded() {
  if (activeStatus !== 'all') renderCards();
  renderProgress();
}

// ── FILTER SETTERS ──
function setDistrictFilter(val, btn) {
  activeDistrict = val;
  document.querySelectorAll('.filter-group:first-child .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function setStatusFilter(val, btn) {
  activeStatus = val;
  document.querySelectorAll('.filter-group:last-child .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ── MODALS ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── REPORT ──
function openReportModal() {
  const tech = state.techName || 'Unknown';
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const timeStr = now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  const { total, resolved, issues, pending } = computeTotals();

  let report = '';
  report += '═'.repeat(60) + '\n';
  report += '  UTMC ONLINE SITES — WARNING REPORT\n';
  report += '  Outstanding Checks & Updates\n';
  report += '═'.repeat(60) + '\n';
  report += `  Technician : ${tech}\n`;
  report += `  Date       : ${dateStr}\n`;
  report += `  Time       : ${timeStr}\n`;
  report += '─'.repeat(60) + '\n\n';

  // Group by district
  const districts = ['Newcastle','North Tyneside','Gateshead','South Tyneside','Sunderland','Northumberland'];
  districts.forEach(district => {
    const districtSites = sites.map((s,i) => ({s,i})).filter(({s}) => s.district === district);
    if (districtSites.length === 0) return;
    report += `▌ ${district.toUpperCase()}\n`;
    report += '─'.repeat(60) + '\n';
    districtSites.forEach(({s, i}) => {
      const warnings = getSiteWarnings(s);
      if (warnings.length === 0) return;
      const sw = state.warnings[i] || {};
      report += `  ${s.scn}  ${s.site}\n`;
      warnings.forEach(wf => {
        const wst = sw[wf.field];
        let statusStr = '[PENDING]';
        if (wst) {
          statusStr = wst.status === 'resolved' ? '[RESOLVED]' : `[ISSUE]`;
        }
        report += `    • ${wf.label.padEnd(24)} ${statusStr}`;
        if (wst && wst.status === 'issue' && wst.note) {
          report += `\n      Note: ${wst.note}`;
        }
        report += '\n';
      });
      if (s.notes && s.notes.trim()) {
        report += `    ! Spreadsheet note: ${s.notes}\n`;
      }
      if (state.techNotes[i] && state.techNotes[i].trim()) {
        report += `    >> Tech note: ${state.techNotes[i]}\n`;
      }
      report += '\n';
    });
  });

  report += '═'.repeat(60) + '\n';
  report += '  SUMMARY\n';
  report += '─'.repeat(60) + '\n';
  report += `  Total Warnings : ${total}\n`;
  report += `  Resolved       : ${resolved}\n`;
  report += `  Issues Logged  : ${issues}\n`;
  report += `  Pending        : ${pending}\n`;
  report += '═'.repeat(60) + '\n';

  document.getElementById('reportText').textContent = report;
  openModal('reportModal');
}

function downloadReport() {
  const tech = (state.techName || 'Technician').replace(/[^a-zA-Z0-9]/g,'_');
  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const text = document.getElementById('reportText').textContent;
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `UTMC_Online_Warnings_${tech}_${dateStr}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadCSV() {
  const csvEsc = v => '"' + String(v).replace(/"/g, '""') + '"';
  const headers = ['SCN','Site','District',
    'Signal Detection (Spreadsheet)','Signal Detection (Status)','Signal Detection (Note)',
    '5G Antennas (Spreadsheet)','5G Antennas (Status)','5G Antennas (Note)',
    'Licence/Firmware (Spreadsheet)','Licence/Firmware (Status)','Licence/Firmware (Note)',
    'MOVA Online (Spreadsheet)','MOVA Online (Status)','MOVA Online (Note)',
    'IC4 Update (Spreadsheet)','IC4 Update (Status)','IC4 Update (Note)',
    'Controller Install (Spreadsheet)','Controller Install (Status)','Controller Install (Note)',
    'ANPR/Smart Detection (Spreadsheet)','ANPR/Smart Detection (Status)','ANPR/Smart Detection (Note)',
    'Spreadsheet Notes','Technician Note','Last Updated','Technician'];
  const rows = [headers.join(',')];
  const techName = state.techName || '';
  const allFields = [
    {field:'signalDetection', exclude:['N/A','INSTALLED']},
    {field:'antennas', exclude:['N/A','INSTALLED']},
    {field:'firmware', exclude:['N/A','INSTALLED']},
    {field:'mova', exclude:['N/A']},
    {field:'ic4', exclude:['N/A']},
    {field:'controllerInstall', exclude:['INSTALLED']},
    {field:'anpr', exclude:['N/A','INSTALLED']}
  ];
  sites.forEach((s, idx) => {
    const sw = state.warnings[idx] || {};
    const cols = [csvEsc(s.scn), csvEsc(s.site), csvEsc(s.district)];
    allFields.forEach(af => {
      const val = s[af.field] || '';
      const isWarning = !af.exclude.includes(val);
      let status = '';
      let note = '';
      if (isWarning) {
        const ws = sw[af.field];
        status = ws ? (ws.status === 'resolved' ? 'Resolved' : 'Issue') : 'Pending';
        note = ws && ws.note ? ws.note : '';
      }
      cols.push(csvEsc(val), csvEsc(status), csvEsc(note));
    });
    cols.push(csvEsc(s.notes || ''));
    cols.push(csvEsc(state.techNotes[idx] || ''));
    cols.push(csvEsc(s.lastUpdate || ''));
    cols.push(csvEsc(techName));
    rows.push(cols.join(','));
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], {type:'text/csv;charset=utf-8'});
  const techFile = (state.techName || 'Technician').replace(/[^a-zA-Z0-9]/g,'_');
  const dateStr = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `UTMC_Online_Warnings_${techFile}_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── CLEAR ──
function openClearModal() { openModal('clearModal'); }

function clearAllData() {
  state = { techName: '', warnings: {}, techNotes: {} };
  saveState();
  document.getElementById('techName').value = '';
  closeModal('clearModal');
  renderCards();
}

// ── DATE ──
function setDate() {
  const now = new Date();
  const d = now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  document.getElementById('dateBadge').textContent = d;
}

// ── TECH NAME ──
document.getElementById('techName').addEventListener('input', function() {
  state.techName = this.value;
  saveState();
});

// ── INIT ──
loadState();
setDate();
document.getElementById('techName').value = state.techName || '';
renderCards();
</script>
